  KevinfromHP:
  - rscadd: New Chasm tiles that drop you into a random part of the Tomb of Matthios
      with more than likely a few broken limbs.
  - map: New area to Vanderlin Keep next to Treasury.
  - qol: Archivist can now summon parchment/scrolls as spells.
  - rscadd: You can now wash off flammables in water by washing yourself or entering
      it for a period of time.
  - rscadd: Water will now soak you as you remain in it. Soaking prevents fire but
      will dry off after a while.
  - rscadd: Pyromaniacs can now sate their addiction by examining someone who is on
      fire rather than needing to be close to them. This doesn't apply to non-mobs.
  - balance: Being soaked dissipates at 40% the rate it previously did.
  - balance: Removed the need to be scrubbed by someone else when using herbal soap
      to acquire the buff, but shortened it's duration to 10 minutes instead of 15.
  - rscadd: Hidden levers can be detected by looking around, similar to a trap. Only
      visible to those who meet the perception DC of the lever.
  - qol: Roles that know the keep's hidden door passwords now have it added to their
      memories.
  - balance: Hidden doors and levers now have a perception DC to be used. A standard
      hidden door/lever has a DC of 10. A keep door/lever is 14. Thieves Guild members
      and Assassins get a +2 bonus to this check.
  - map: Re-added Keep architectural plans to Vanderlin's archive room. These are
      used to reveal the locations of the hidden doors.
  PineappleMan929:
  - spellcheck: no more cum in common language
  - balance: Removes (the extremely dead) Psydon's traits, giving them to the inquisition
